name: fuel_finder_ireland
description: Find the cheapest petrol and diesel near you in Ireland.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_map: ^8.2.2
  flutter_map_marker_cluster: ^8.2.2
  latlong2: ^0.9.1
  supabase_flutter: ^2.12.0
  flutter_riverpod: ^3.3.1
  shared_preferences: ^2.5.4
  geolocator: ^14.0.2
  google_fonts: ^8.0.2
  intl: ^0.20.2
  shimmer: ^3.0.0
  url_launcher: ^6.3.2
  connectivity_plus: ^7.0.0
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
